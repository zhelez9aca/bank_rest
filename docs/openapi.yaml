openapi: 3.0.3
info:
  title: bank_rest API
  version: 1.0.0
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: Cards
  - name: Transfers
  - name: Admin
  - name: BlockRequests

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string }
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string }
    CreateCardRequest:
      type: object
      required: [holderName]
      properties:
        holderName: { type: string }
    CardResponse:
      type: object
      properties:
        maskedPan: { type: string, example: "**** **** **** 1234" }
        holderName: { type: string }
        expiryMonth: { type: integer, example: 4 }
        expiryYear: { type: integer, example: 2029 }
        status: { $ref: '#/components/schemas/CardStatus' }
        balance: { type: number, format: double }
    CardStatus:
      type: string
      enum: [ACTIVE, BLOCKED, EXPIRED]
    TransferRequest:
      type: object
      required: [fromCardId, toCardId, amount]
      properties:
        fromCardId: { type: integer, format: int64 }
        toCardId: { type: integer, format: int64 }
        amount: { type: number, format: double }
    DepositRequest:
      type: object
      required: [amount]
      properties:
        amount: { type: number, format: double }
    CardBlockRequest:
      type: object
      properties:
        reason: { type: string }
    CardBlockStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    CardBlockRequestResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        cardId: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/CardBlockStatus' }
        reason: { type: string }
        createdAt: { type: string, format: date-time }
    UserStatus:
      type: string
      enum: [ACTIVE, BLOCKED]
    Role:
      type: string
      enum: [ADMIN, USER]
    UserResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        role: { $ref: '#/components/schemas/Role' }
        login: { type: string }
        name: { type: string }
        userStatus: { $ref: '#/components/schemas/UserStatus' }

paths:
  /auth/register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200': { description: OK }
  /auth/login:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: OK }

  /cards:
    get:
      tags: [Cards]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
        - in: query
          name: statusEnum
          schema: { $ref: '#/components/schemas/CardStatus' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [Cards]
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCardRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CardResponse' }

  /cards/{id}/block-request:
    post:
      tags: [BlockRequests]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardBlockRequest' }
      responses:
        '200': { description: OK }

  /transfers:
    post:
      tags: [Transfers]
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferRequest' }
      responses:
        '200': { description: OK }

  /admin/cards:
    get:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
        - in: query
          name: cardStatus
          schema: { $ref: '#/components/schemas/CardStatus' }
      responses:
        '200': { description: OK }

  /admin/cards/{id}/deposit:
    post:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepositRequest' }
      responses:
        '200': { description: OK }

  /admin/cards/{id}/block:
    patch:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/cards/{id}/activate:
    patch:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/cards/{id}:
    delete:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/users:
    get:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }

  /admin/users/{id}/block:
    patch:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/users/{id}/activate:
    patch:
      tags: [Admin]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/block-requests:
    get:
      tags: [BlockRequests]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 0 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/CardBlockStatus' }
      responses:
        '200': { description: OK }

  /admin/block-requests/{id}/approve:
    patch:
      tags: [BlockRequests]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /admin/block-requests/{id}/reject:
    patch:
      tags: [BlockRequests]
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
